{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="bi bi-people"></i> Customers</h2>
  <a href="{{ url_for('add_customer') }}" class="btn btn-primary">
    <i class="bi bi-plus-circle"></i> Add Customer
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-0">
    <table class="table table-hover table-striped mb-0">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Joined</th>
          <th>Orders</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for c in customers %}
        <tr>
          <td>{{ c.customer_id }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.created_at }}</td>
          <td>
            <a href="{{ url_for('customer_orders', id=c.customer_id) }}" class="badge bg-primary text-decoration-none">
              {{ c.orders|length }} order(s)
            </a>
          </td>
          <td>
            <a href="{{ url_for('edit_customer', id=c.customer_id) }}" class="btn btn-sm btn-outline-secondary me-1">
              <i class="bi bi-pencil"></i>
            </a>
            <form method="POST" action="{{ url_for('delete_customer', id=c.customer_id) }}" class="d-inline"
                  onsubmit="return confirm('Delete {{ c.name }}?')">
              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="6" class="text-center text-muted py-3">No customers yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
