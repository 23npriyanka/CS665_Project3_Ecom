{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">
        <i class="bi bi-box"></i> {{ action }} Product
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Product Name <span class="text-danger">*</span></label>
            <input type="text" name="product_name" class="form-control"
                   value="{{ product.product_name if product else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Price ($) <span class="text-danger">*</span></label>
            <input type="number" step="0.01" min="0" name="price" class="form-control"
                   value="{{ product.price if product else '' }}" required>
            <div class="form-text">Must be a non-negative number.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Seller <span class="text-danger">*</span></label>
            <select name="seller_id" class="form-select" required>
              <option value="">— Select Seller —</option>
              {% for s in sellers %}
              <option value="{{ s.seller_id }}"
                {% if product and product.seller_id == s.seller_id %}selected{% endif %}>
                {{ s.seller_name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Note</label>
            <input type="text" name="note" class="form-control"
                   value="{{ product.note if product else '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle"></i> Save
            </button>
            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
