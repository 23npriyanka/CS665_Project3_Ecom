{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="bi bi-person-badge"></i> Sellers</h2>
  <a href="{{ url_for('add_seller') }}" class="btn btn-primary">
    <i class="bi bi-plus-circle"></i> Add Seller
  </a>
</div>

<div class="card shadow-sm">
  <div class="card-body p-0">
    <table class="table table-hover table-striped mb-0">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Seller Name</th>
          <th>Joined</th>
          <th>Source</th>
          <th>Products</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for s in sellers %}
        <tr>
          <td>{{ s.seller_id }}</td>
          <td>{{ s.seller_name }}</td>
          <td>{{ s.join_date }}</td>
          <td><span class="badge bg-secondary">{{ s.source or '—' }}</span></td>
          <td>{{ s.products|length }}</td>
          <td>
            <a href="{{ url_for('edit_seller', id=s.seller_id) }}" class="btn btn-sm btn-outline-secondary me-1">
              <i class="bi bi-pencil"></i>
            </a>
            <form method="POST" action="{{ url_for('delete_seller', id=s.seller_id) }}" class="d-inline"
                  onsubmit="return confirm('Delete {{ s.seller_name }}?')">
              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="6" class="text-center text-muted py-3">No sellers yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
